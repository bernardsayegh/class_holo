    H0_shoes_err: 1.04
params:
  omega_b:
    prior: [0.019, 0.025]
    ref: 0.02237
    proposal: 0.0003
    latex: \omega_b
  omega_cdm:
    prior: [0.095, 0.145]
    ref: 0.12
    proposal: 0.003
    latex: \omega_{cdm}
  H0:
    prior: [60, 80]
    ref: 68.0
    proposal: 1.0
    latex: H_0
  logA:
    prior: [2.7, 3.4]
    ref: 3.044
    proposal: 0.02
    latex: \log(10^{10}A_s)
    drop: true
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_s
  n_s:
    prior: [0.9, 1.05]
    ref: 0.9649
    proposal: 0.008
    latex: n_s
  tau_reio:
    prior: [0.01, 0.12]
    ref: 0.0544
    proposal: 0.01
    latex: \tau_{reio}
  A_IA:
    prior: [-5.0, 5.0]
    ref: 0.0
    proposal: 0.5
    latex: A_{IA}
  alpha_IA:
    prior: [-5.0, 5.0]
    ref: 0.0
    proposal: 0.5
    latex: \alpha_{IA}
  sigma8:
    latex: \sigma_8
  Omega_m:
    latex: \Omega_m
  S8:
    derived: 'lambda sigma8, Omega_m: sigma8*np.sqrt(Omega_m/0.3)'
    latex: S_8
  H0_local:
    latex: H_0^{local}
  S8_loc:
    derived: 'lambda sigma8, Omega_m, H0, H0_local: sigma8*__import__("numpy").sqrt(Omega_m*(H0/H0_local)**2/0.3)'
    latex: S_8^{local}
sampler:
  mcmc:
    Rminus1_stop: 0.01
    max_tries: 10000
    learn_proposal: true
    output_every: 60s
output: chains_test/modelB_A1_v3_full
packages_path: /Users/Bernard_1/holographic_mcmc/packages
